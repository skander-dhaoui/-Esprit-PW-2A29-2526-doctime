<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Inscription - DocTime</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { background: linear-gradient(135deg, #2A7FAA 0%, #4CAF50 100%); min-height: 100vh; display: flex; align-items: center; justify-content: center; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; padding: 20px; }
        .register-card { background: white; border-radius: 20px; box-shadow: 0 20px 40px rgba(0,0,0,0.1); overflow: hidden; width: 100%; max-width: 600px; animation: fadeIn 0.5s ease; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(-20px); } to { opacity: 1; transform: translateY(0); } }
        .register-header { background: linear-gradient(135deg, #2A7FAA 0%, #3e8e41 100%); color: white; padding: 25px; text-align: center; }
        .register-header .logo-container { display: flex; justify-content: center; margin-bottom: 8px; }
        .register-header .logo-container img { height: 80px; width: auto; object-fit: contain; filter: drop-shadow(0 2px 8px rgba(0,0,0,0.2)); }
        .register-header p { font-size: 13px; opacity: 0.9; }
        .register-body { padding: 30px; }
        .form-control, .form-select { border-radius: 10px; padding: 10px 15px; border: 1px solid #ddd; transition: all 0.3s; }
        .form-control:focus, .form-select:focus { border-color: #4CAF50; box-shadow: 0 0 0 3px rgba(76,175,80,0.1); }
        .btn-register { background: #4CAF50; color: white; border-radius: 10px; padding: 12px; width: 100%; font-weight: bold; font-size: 16px; border: none; transition: all 0.3s; }
        .btn-register:hover { background: #2A7FAA; transform: translateY(-2px); }
        .role-selector { display: flex; gap: 15px; margin-bottom: 25px; }
        .role-option { flex: 1; text-align: center; padding: 12px; border: 2px solid #e0e0e0; border-radius: 12px; cursor: pointer; transition: all 0.3s; background: #f9f9f9; }
        .role-option i { font-size: 24px; margin-bottom: 5px; display: block; }
        .role-option.active { border-color: #4CAF50; background: #e8f5e9; color: #4CAF50; }
        .role-option:hover { border-color: #4CAF50; transform: translateY(-2px); }
        .section-title { font-size: 14px; font-weight: bold; margin: 20px 0 15px 0; color: #2A7FAA; border-left: 4px solid #4CAF50; padding-left: 10px; }
        .password-requirements { font-size: 12px; color: #999; margin-top: 5px; }
        .requirement-valid { color: #4CAF50; }
        .requirement-invalid { color: #dc3545; }
        .alert-error { background: #f8d7da; color: #721c24; border-radius: 10px; padding: 12px 15px; margin-bottom: 20px; display: none; }
        .alert-success { background: #d4edda; color: #155724; border-radius: 10px; padding: 12px 15px; margin-bottom: 20px; display: none; }
        .login-link { color: #2A7FAA; text-decoration: none; }
        .login-link:hover { color: #4CAF50; text-decoration: underline; }
        hr { margin: 20px 0; }
        .medecin-fields { display: none; animation: fadeIn 0.3s ease; }
    </style>
</head>
<body>
    <div class="register-card">
        <div class="register-header">
            <div class="logo-container">
                <img src="logo_doctime.png" alt="DocTime Logo">
            </div>
            <p>Rejoignez DocTime et facilitez votre accès aux soins</p>
        </div>
        <div class="register-body">
            <div id="errorMessage" class="alert-error"><i class="fas fa-exclamation-circle me-2"></i><span id="errorText"></span></div>
            <div id="successMessage" class="alert-success"><i class="fas fa-check-circle me-2"></i><span id="successText"></span></div>
            <div class="role-selector">
                <div class="role-option active" data-role="patient"><i class="fas fa-user"></i><div>Patient</div></div>
                <div class="role-option" data-role="medecin"><i class="fas fa-user-md"></i><div>Médecin</div></div>
            </div>
            <form id="registerForm" action="/register" method="POST">
                <input type="hidden" name="role" id="selectedRole" value="patient">
                <div class="section-title"><i class="fas fa-user-circle"></i> Informations personnelles</div>
                <div class="row">
                    <div class="col-md-6 mb-3"><label class="form-label">Nom <span class="text-danger">*</span></label><input type="text" name="nom" id="nom" class="form-control" placeholder="Votre nom" required></div>
                    <div class="col-md-6 mb-3"><label class="form-label">Prénom <span class="text-danger">*</span></label><input type="text" name="prenom" id="prenom" class="form-control" placeholder="Votre prénom" required></div>
                </div>
                <div class="row">
                    <div class="col-md-6 mb-3"><label class="form-label">Email <span class="text-danger">*</span></label><input type="email" name="email" id="email" class="form-control" placeholder="exemple@email.com" required></div>
                    <div class="col-md-6 mb-3"><label class="form-label">Téléphone <span class="text-danger">*</span></label><input type="tel" name="telephone" id="telephone" class="form-control" placeholder="+216 XX XXX XXX" required></div>
                </div>
                <div class="row">
                    <div class="col-md-6 mb-3">
                        <label class="form-label">Mot de passe <span class="text-danger">*</span></label>
                        <input type="password" name="password" id="password" class="form-control" placeholder="••••••••" required>
                        <div class="password-requirements">
                            <span id="reqLength" class="requirement-invalid"><i class="fas fa-circle me-1"></i> Au moins 8 caractères</span><br>
                            <span id="reqUpper" class="requirement-invalid"><i class="fas fa-circle me-1"></i> Au moins une majuscule</span><br>
                            <span id="reqNumber" class="requirement-invalid"><i class="fas fa-circle me-1"></i> Au moins un chiffre</span>
                        </div>
                    </div>
                    <div class="col-md-6 mb-3"><label class="form-label">Confirmer mot de passe <span class="text-danger">*</span></label><input type="password" name="password_confirm" id="passwordConfirm" class="form-control" placeholder="••••••••" required></div>
                </div>
                <div id="medecinFields" class="medecin-fields">
                    <div class="section-title"><i class="fas fa-stethoscope"></i> Informations professionnelles</div>
                    <div class="row">
                        <div class="col-md-6 mb-3">
                            <label class="form-label">Spécialité <span class="text-danger">*</span></label>
                            <select name="specialite" id="specialite" class="form-select">
                                <option value="">Sélectionner une spécialité</option>
                                <option>Cardiologue</option><option>Dermatologue</option><option>Gynécologue</option>
                                <option>Pédiatre</option><option>Généraliste</option><option>Ophtalmologue</option>
                                <option>Orthopédiste</option><option>Neurologue</option><option>Psychiatre</option><option>Dentiste</option>
                            </select>
                        </div>
                        <div class="col-md-6 mb-3"><label class="form-label">Numéro d'inscription à l'ordre <span class="text-danger">*</span></label><input type="text" name="numero_ordre" id="numeroOrdre" class="form-control" placeholder="Ex: 12345"></div>
                    </div>
                    <div class="row">
                        <div class="col-md-6 mb-3"><label class="form-label">Tarif de consultation (DT)</label><input type="number" name="tarif" id="tarif" class="form-control" placeholder="50" step="5"></div>
                        <div class="col-md-6 mb-3"><label class="form-label">Années d'expérience</label><input type="number" name="experience" id="experience" class="form-control" placeholder="5"></div>
                    </div>
                    <div class="mb-3"><label class="form-label">Adresse du cabinet</label><textarea name="adresse_cabinet" id="adresseCabinet" class="form-control" rows="2" placeholder="Adresse complète du cabinet"></textarea></div>
                </div>
                <div class="form-check mb-3">
                    <input type="checkbox" class="form-check-input" id="terms" required>
                    <label class="form-check-label">J'accepte les <a href="#" class="login-link">conditions d'utilisation</a> et la <a href="#" class="login-link">politique de confidentialité</a></label>
                </div>
                <button type="submit" class="btn-register"><i class="fas fa-user-plus me-2"></i> S'inscrire</button>
            </form>
            <hr>
            <div class="text-center"><p class="mb-0">Déjà un compte ? <a href="login.html" class="login-link">Se connecter</a></p></div>
        </div>
    </div>
    <script>
        document.querySelectorAll('.role-option').forEach(o => o.addEventListener('click', function() { document.querySelectorAll('.role-option').forEach(x=>x.classList.remove('active')); this.classList.add('active'); const r=this.dataset.role; document.getElementById('selectedRole').value=r; const mf=document.getElementById('medecinFields'); if(r==='medecin'){mf.style.display='block';document.getElementById('specialite').required=true;document.getElementById('numeroOrdre').required=true;}else{mf.style.display='none';document.getElementById('specialite').required=false;document.getElementById('numeroOrdre').required=false;} }));
        function validatePassword(p){return{length:p.length>=8,upper:/[A-Z]/.test(p),number:/[0-9]/.test(p)};}
        function updatePasswordRequirements(){const p=document.getElementById('password').value,v=validatePassword(p); ['Length','Upper','Number'].forEach(k=>{const el=document.getElementById('req'+k),ok=v[k.toLowerCase()]; el.className=ok?'requirement-valid':'requirement-invalid'; el.innerHTML=`<i class="fas fa-${ok?'check-':''}circle me-1"></i> ${el.innerText.replace(/.*? /,'')}`; }); }
        document.getElementById('registerForm').addEventListener('submit', function(e) {
            e.preventDefault(); document.getElementById('errorMessage').style.display='none'; document.getElementById('successMessage').style.display='none';
            const nom=document.getElementById('nom').value,prenom=document.getElementById('prenom').value,email=document.getElementById('email').value,telephone=document.getElementById('telephone').value,password=document.getElementById('password').value,passwordConfirm=document.getElementById('passwordConfirm').value,role=document.getElementById('selectedRole').value,terms=document.getElementById('terms').checked;
            if(!nom||!prenom||!email||!telephone||!password||!passwordConfirm){showError('Veuillez remplir tous les champs obligatoires.');return;}
            if(!email.includes('@')||!email.includes('.')){showError('Veuillez saisir un email valide.');return;}
            const phoneRegex=/^(\+216)?[0-9]{8}$/; if(!phoneRegex.test(telephone.replace(/\s/g,''))){showError('Numéro de téléphone invalide (8 chiffres).');return;}
            const pv=validatePassword(password); if(!pv.length||!pv.upper||!pv.number){showError('Le mot de passe ne respecte pas les critères de sécurité.');return;}
            if(password!==passwordConfirm){showError('Les mots de passe ne correspondent pas.');return;}
            if(!terms){showError("Vous devez accepter les conditions d'utilisation.");return;}
            if(role==='medecin'){const s=document.getElementById('specialite').value,n=document.getElementById('numeroOrdre').value; if(!s){showError('Veuillez sélectionner votre spécialité.');return;} if(!n){showError("Veuillez saisir votre numéro d'inscription à l'ordre.");return;}}
            showSuccess('Inscription réussie ! Vous allez être redirigé vers la page de connexion.');
            setTimeout(()=>window.location.href='login.html',2000);
        });
        function showError(msg){const d=document.getElementById('errorMessage');document.getElementById('errorText').innerText=msg;d.style.display='block';setTimeout(()=>d.style.display='none',5000);}
        function showSuccess(msg){const d=document.getElementById('successMessage');document.getElementById('successText').innerText=msg;d.style.display='block';}
        document.getElementById('password').addEventListener('input',updatePasswordRequirements);
        document.getElementById('passwordConfirm').addEventListener('input',function(){const p=document.getElementById('password').value,c=this.value;this.style.borderColor=p&&c&&p!==c?'#dc3545':'#ddd';});
    </script>
</body>
</html>
